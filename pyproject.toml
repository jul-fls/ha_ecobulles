[tool.coverage.run]
branch = true
source = ["custom_components/ecobulles"]
omit = [
  "custom_components/ecobulles/__init__.py",
]

[tool.coverage.report]
fail_under = 70
show_missing = true
skip_covered = true

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true
warn_return_any = false
disallow_subclassing_any = false
disallow_untyped_decorators = false
exclude = [
  "tests/",
  "scripts/",
]
