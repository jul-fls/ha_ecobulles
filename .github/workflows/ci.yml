name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  local-checks:
    name: Local checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
      - name: Run lightweight integration checks
        run: python scripts/check_integration.py

  home-assistant-tests:
    name: Home Assistant mocked integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest -q --cov --cov-report=term-missing --cov-report=json:coverage.json
      - name: Upload coverage report
        uses: actions/upload-artifact@main
        with:
          name: coverage-json
          path: coverage.json
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.json
          slug: jul-fls/ha_ecobulles
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  typing:
    name: Strict typing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_typing.txt
      - name: Install typing dependencies
        run: python -m pip install -r requirements_typing.txt
      - name: Run mypy
        run: mypy custom_components/ecobulles

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: hacs/action@main
        with:
          category: integration
