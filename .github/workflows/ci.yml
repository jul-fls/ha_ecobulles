name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  local-checks:
    name: Local checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
      - name: Run lightweight integration checks
        run: python scripts/check_integration.py

  home-assistant-tests:
    name: Home Assistant mocked integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/setup-python@main
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Run pytest
        run: pytest -q

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: hacs/action@main
        with:
          category: integration
